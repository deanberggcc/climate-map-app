<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Climate Organizations Map</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

  <!-- Mapbox -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet" />

  <!-- Your styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Outer wrapper (harmless, helps if any old CSS/JS still references #container) -->
  <div id="container">
    <!-- MAP CONTAINER (full screen) -->
    <div id="map-container">

      <!-- SIDEBAR (overlays the map) -->
      <div id="sidebar">
	<div id="sidebar-content">
        	<div id="sidebar-header">
        	  <h2>Climate Organizations Map</h2>
        	  <input id="search-bar" type="text" placeholder="Search organizations...">
       		 </div>

      	  <!-- CLEAR FILTERS BUTTON -->
      	  <button id="clear-filters" class="clear-filters-btn">Clear All Filters</button>

      	  <!-- FILTERS (injected by JS) -->
      	  <div id="filters"></div>

      	  <!-- ORG LIST (injected by JS) -->
      	  <div id="org-list"></div>
	</div>
      </div>

	<button id="sidebar-toggle">⟨</button>

      <!-- MAP -->
      <div id="map"></div>

    </div>
  </div>

  <!-- Your JS -->
  <script src="app.js"></script>
</body>
</html>
