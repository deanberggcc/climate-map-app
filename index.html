<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Climate Organizations Map</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

  <!-- Mapbox -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet" />

  <!-- Your styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Outer wrapper (harmless, helps if any old CSS/JS still references #container) -->
  <div id="container">
<!-- MAP -->
<div id="map"></div>

<!-- SIDEBAR (overlays the map) -->
<div id="sidebar">
  <div id="sidebar-content">

    <!-- Header + Search -->
    <div id="sidebar-header">
      <h2>Climate Organizations Map</h2>
      <input id="search-bar" type="text" placeholder="Search organizations...">
    </div>

    <!-- Filters -->
    <div id="filters">
      <!-- Your dynamically generated filters will populate here -->
    </div>

    <!-- Organization List -->
    <div id="org-list">
      <!-- Your dynamically generated org list will populate here -->
    </div>

  </div>
</div>

<!-- TOGGLE BUTTON (must be outside sidebar) -->
<button id="sidebar-toggle">⟨</button>
  </div>

  <!-- Your JS -->
  <script src="app.js"></script>
</body>
</html>
