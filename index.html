<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Climate Organizations Map</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

  <!-- Mapbox -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

  <!-- Your styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<!-- MAP -->
<div id="map"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-content">

    <div id="sidebar-header">
      <h2>Climate Organizations Map</h2>
      <input id="search-bar" type="text" placeholder="Search organizations...">
    </div>

    <h3 class="sidebar-section-header">Filters</h3>
	<div id="filters"></div>
    <h3 class="sidebar-section-header">Organizations in View</h3>
	<div id="org-list"></div>

  </div>
</div>

<!-- TOGGLE BUTTON -->
<button id="sidebar-toggle">⟨</button>

<!-- JS -->
<script type="module" src="app.js"></script>

</body>
</html>
